<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <h1>Your Cart</h1>
    <a href="{{ url_for('home') }}">Back to Shop</a>
    <div>
        {% for item in cart %}
        <div>
            <h2>{{ item.name }}</h2>
            <p>${{ item.price }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
